{% extends 'base.html' %}
{% block title %}Register – GASUL LPG{% endblock %}
{% block extra_css %}
<style>
  .auth-wrap { min-height:calc(100vh - 144px); display:flex; align-items:center; justify-content:center; padding:2rem; background:linear-gradient(135deg,#f5f5f0 0%,#ffe8e0 100%); }
  .auth-card { background:white; border-radius:16px; padding:2.5rem; width:100%; max-width:420px; box-shadow:0 8px 40px rgba(0,0,0,0.12); }
  .auth-header { text-align:center; margin-bottom:2rem; }
  .auth-header .icon { font-size:3rem; }
  .auth-header h2 { font-family:'Bebas Neue',sans-serif; font-size:2rem; color:var(--gas-blue); letter-spacing:2px; margin-top:0.5rem; }
  .auth-header p { color:var(--muted); font-size:0.9rem; }
  .auth-footer { text-align:center; margin-top:1.5rem; font-size:0.875rem; color:var(--muted); }
  .auth-footer a { color:var(--flame); font-weight:600; text-decoration:none; }
</style>
{% endblock %}
{% block content %}
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-header">
      <div class="icon">🔥</div>
      <h2>Create Account</h2>
      <p>Join GASUL LPG Surigao today</p>
    </div>
    <form method="post">
      {% csrf_token %}
      <div class="form-group"><label>Username</label><input type="text" name="username" required autofocus placeholder="Choose a username"></div>
      <div class="form-group"><label>Email <span style="color:var(--muted);font-weight:400">(optional)</span></label><input type="email" name="email" placeholder="your@email.com"></div>
      <div class="form-group"><label>Password</label><input type="password" name="password" required placeholder="At least 6 characters"></div>
      <div class="form-group"><label>Confirm Password</label><input type="password" name="password2" required placeholder="Repeat your password"></div>
      <button type="submit" class="btn btn-primary btn-full" style="margin-top:0.5rem">Create Account →</button>
    </form>
    <div class="auth-footer">Already have an account? <a href="{% url 'users:login' %}">Login here</a></div>
  </div>
</div>
{% endblock %}
